schema_version: 1

context:
  name: crocoddyl
  version: "3.2.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/loco-3d/${{ name }}/archive/v${{ version }}.tar.gz
  sha256: bfc29c806ed452a2ed1d1f7431b8625a0e8a9af3a049c50cf8ea128e700148e0

build:
  number: 0
  skip: win

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
        - pinocchio
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - cmake
    - ninja
  host:
    - eigen
    - eigen-abi-devel
    - eigenpy
    - pinocchio
    - libboost-python-devel
    - libboost-devel
    - python
    - example-robot-data
    - numpy
  run:
    - eigen
    - eigenpy
    - pinocchio
    - python
    - example-robot-data
  run_exports:
    - ${{ pin_subpackage(name, upper_bound='x.x.x') }}

tests:
  - python:
      imports:
        - crocoddyl
  - requirements:
      run:
        - pkg-config
    script:
      - pkg-config --modversion ${{ name }}
      - if: not win
        then: test -f $PREFIX/lib/lib${{ name }}${SHLIB_EXT}

about:
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Crocoddyl is an optimal control library for robot control under contact sequence. Its solver is based on various efficient Differential Dynamic Programming (DDP)-like algorithms.
  homepage: http://github.com/loco-3d/crocoddyl
  repository: https://github.com/loco-3d/crocoddyl

extra:
  recipe-maintainers:
    - ManifoldFR
    - olivier-roussel
    - jorisv
    - jcarpent
